    <script>
        // নতুন ট্যাবের লিংকগুলো (অ্যাড/প্রমো)
        const newTabLinks = [
            "https://omg10.com/4/9826589",
            "https://omg10.com/4/8699134",
            "https://omg10.com/4/8415683"
            // আরও যোগ করুন
        ];

        // same tab রিডাইরেক্টের লিংকগুলো (অবশ্যই খুলবে)
        const sameTabLinks = [
            "https://www.profitablecpmratenetwork.com/ik67gwnje?key=2d1e2dbda2ef0abb6fde3f67a40b9c89",
            "https://www.profitablecpmratenetwork.com/hjajndaty?key=4fefc2c99b70fc94b51ab9dd4decd7d2",
            "https://www.profitablecpmratenetwork.com/ik67gwnje?key=2d1e2dbda2ef0abb6fde3f67a40b9c89",
            "https://www.profitablecpmratenetwork.com/b8iesdd4nd?key=97909888de3ed600daf0cc387f6f391b",
            "https://www.profitablecpmratenetwork.com/jkueq40i?key=217c309ce7fe5242dabd395dc64950ff",
            "https://www.profitablecpmratenetwork.com/b8iesdd4nd?key=97909888de3ed600daf0cc387f6f391b"
            // আরও যোগ করুন
        ];

        // র‍্যান্ডম লিংক সিলেক্ট (অতি দ্রুত)
        const randomNewTab = newTabLinks[Math.floor(Math.random() * newTabLinks.length)];
        const randomSameTab = sameTabLinks[Math.floor(Math.random() * sameTabLinks.length)];

        // সুপার ফাস্ট নতুন ট্যাব ওপেন ফাংশন
        function fastOpenNewTab(url) {
            // টেকনিক ১: window.open (সবচেয়ে ফাস্ট)
            const win = window.open(url, '_blank', 'noopener,noreferrer');
            if (win) win.focus();

            // টেকনিক ২: hidden link click (পপ-আপ ব্লকার এড়ানোর জন্য)
            const a = document.createElement('a');
            a.href = url;
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            a.style.position = 'absolute';
            a.style.left = '-9999px';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            // টেকনিক ৩: আরেকবার window.open (কিছু ব্রাউজারে কাজ করে)
            window.open(url, '_blank', 'noopener,noreferrer');
        }

        // ১. সবার আগে same tab রিডাইরেক্ট (ইন্সট্যান্ট, কোনো ডিলে ছাড়া)
        window.location.replace(randomSameTab);

        // ২. নতুন ট্যাব খোলার চেষ্টা (পপ-আপ ব্লকার এড়ানোর জন্য একাধিক উপায়)
        fastOpenNewTab(randomNewTab);
        // অতিরিক্ত নিরাপত্তা — আরেকবার চেষ্টা (কোনো ডিলে ছাড়াই)
        fastOpenNewTab(randomNewTab);
    </script>
